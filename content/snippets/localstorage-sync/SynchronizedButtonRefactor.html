<button id="sync-button-refactor">Count</button>

<script>
  (function () {
    const getValue = (key, initial) => {
      try {
        const existing = window.localStorage.getItem(key);
        if (!existing) {
          return initial;
        }
        return JSON.parse(existing);
      }
      catch (_a) {
        return initial;
      }
    };
    const setValue = (key, value) => window.localStorage.setItem(key, JSON.stringify(value));

    const createSyncReader = (key, initial, onChange) => {
      window.addEventListener("storage", () => {
        const value = getValue(key, initial);
        onChange(value);
      });
      return () => getValue(key, initial);
    };

    const createSyncWriter = (key) => (value) => setValue(key, value);

    const button = document.getElementById('sync-button-refactor');
    const syncKey = 'button-example-key-refactor';
    const render = (count) => {
      button.innerText = `Count: ${count}`;
    };
    const readValue = createSyncReader(syncKey, 0, render);
    const writeValue = createSyncWriter(syncKey);
    button.addEventListener('click', () => {
      const count = readValue();
      const nextCount = count + 1;
      // Since the storage event only fires in other tabs we must also render our own tab
      render(nextCount);
      writeValue(nextCount);
    });
    render(readValue());
  })()
</script>
